server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://dea5uygxt34p9.cloudfront.net"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false
            maxAge: 3600
      routes:
        # --- AUTH (public, no JWT required) ---
        - id: auth-routes
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        # --- USER (JWT required) ---
        - id: user-routes
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - name: JwtAuthFilter

        # --- PRODUCTS public (no JWT) ---
        - id: product-public-routes
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/products,/api/products/**

        # --- PRODUCTS admin (JWT + ADMIN role) ---
        - id: product-admin-routes
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/admin/products/**,/api/admin/categories/**
          filters:
            - name: JwtAuthFilter
              args:
                requiredRole: ADMIN

        # --- CATEGORIES public (no JWT) ---
        - id: category-public-routes
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/categories,/api/categories/**

        # --- ORDERS buyer (JWT required) ---
        - id: order-buyer-routes
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - name: JwtAuthFilter

        # --- ORDERS admin (JWT + ADMIN role) ---
        - id: order-admin-routes
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/admin/orders/**,/api/admin/dashboard/**
          filters:
            - name: JwtAuthFilter
              args:
                requiredRole: ADMIN

        # --- PAYMENTS buyer (JWT required) ---
        - id: payment-buyer-routes
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
          filters:
            - name: JwtAuthFilter

        # --- MIDTRANS WEBHOOK (no JWT, Midtrans sends this) ---
        - id: payment-webhook-route
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/webhook
            - Method=POST
      httpclient:
        connect-timeout: 3000
        response-timeout: 5s

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info
