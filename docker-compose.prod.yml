services:
  nginx:
    image: nginx:alpine
    container_name: buminiaga-nginx

    ports:
      - "80:80"

    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      api-gateway:
        condition: service_healthy

    restart: unless-stopped

    mem_limit: 32m
    cpus: 0.25

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - buminiaga

  api-gateway:
    build:
      context: ./backend/api-gateway

    container_name: buminiaga-gateway

    environment:
      JAVA_OPTS: "-Xms64m -Xmx128m -XX:+UseSerialGC -XX:MaxMetaspaceSize=192m"

      JWT_SECRET: ${JWT_SECRET}

      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082

      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}

    depends_on:
      user-service:
        condition: service_healthy

      product-service:
        condition: service_healthy

    restart: unless-stopped

    mem_limit: 180m
    cpus: 0.50

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 60s
      timeout: 3s
      retries: 2
      start_period: 90s

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - buminiaga

  user-service:
    build:
      context: ./backend/user-service

    container_name: buminiaga-user

    environment:
      JAVA_OPTS: "-Xms64m -Xmx192m -XX:+UseSerialGC -XX:MaxMetaspaceSize=256m"

      DB_URL: ${DB_URL_USER}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

    restart: unless-stopped

    mem_limit: 220m
    cpus: 0.50

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 60s
      timeout: 3s
      retries: 2
      start_period: 90s

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - buminiaga

  product-service:
    build:
      context: ./backend/product-service

    container_name: buminiaga-product

    environment:
      JAVA_OPTS: "-Xms64m -Xmx256m -XX:+UseSerialGC -XX:MaxMetaspaceSize=256m"

      DB_URL: ${DB_URL_PRODUCT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_CLOUDFRONT_URL: ${AWS_CLOUDFRONT_URL}
      AWS_REGION: ${AWS_REGION}

    restart: unless-stopped

    mem_limit: 220m
    cpus: 0.50

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 60s
      timeout: 3s
      retries: 2
      start_period: 90s

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - buminiaga

networks:
  buminiaga:
    driver: bridge