apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: buminiaga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/buminiaga/product-service:latest
          ports:
            - containerPort: 8082
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_SECRET_KEY
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_S3_BUCKET
            - name: AWS_CLOUDFRONT_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AWS_CLOUDFRONT_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: buminiaga
spec:
  selector:
    app: product-service
  ports:
    - port: 8082
      targetPort: 8082
