apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: buminiaga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/buminiaga/api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8084"
            - name: ALLOWED_ORIGIN
              value: "https://www.buminiagaagrochem.id"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: buminiaga
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
