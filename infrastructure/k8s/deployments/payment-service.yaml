apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: buminiaga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com/buminiaga/payment-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_URL
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
            - name: MIDTRANS_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MIDTRANS_SERVER_KEY
            - name: MIDTRANS_CLIENT_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MIDTRANS_CLIENT_KEY
            - name: MIDTRANS_PRODUCTION
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MIDTRANS_PRODUCTION
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "400m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: buminiaga
spec:
  selector:
    app: payment-service
  ports:
    - port: 8084
      targetPort: 8084
